<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0B1020"/>
      <stop offset="55%" stop-color="#101A33"/>
      <stop offset="100%" stop-color="#0C162C"/>
    </linearGradient>
    <radialGradient id="glow1" cx="900" cy="220" r="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00C2A8" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#00C2A8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="220" cy="280" r="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="termBg" x1="660" y1="60" x2="660" y2="365" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#162038"/>
      <stop offset="100%" stop-color="#10192B"/>
    </linearGradient>
    <linearGradient id="termBorder" x1="660" y1="60" x2="660" y2="365" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#24314F"/>
      <stop offset="100%" stop-color="#182238"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.025" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect width="1200" height="400" fill="url(#grid)"/>
  <rect width="1200" height="400" fill="url(#glow1)"/>
  <rect width="1200" height="400" fill="url(#glow2)"/>

  <circle cx="110" cy="78" r="1.6" fill="#00C2A8" opacity="0.25"/>
  <circle cx="175" cy="56" r="1.2" fill="#60A5FA" opacity="0.2"/>
  <circle cx="1080" cy="70" r="1.2" fill="#93C5FD" opacity="0.18"/>
  <circle cx="1125" cy="340" r="1.8" fill="#2DD4BF" opacity="0.22"/>

  <g transform="translate(80, 110)">
    <rect x="0" y="0" width="56" height="56" rx="14" fill="#00C2A8" opacity="0.12"/>
    <text x="28" y="36" font-family="SF Mono, Menlo, Consolas, monospace" font-size="28" fill="#2DD4BF" text-anchor="middle" font-weight="600">RC</text>
    <text x="72" y="25" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="36" fill="#F8FAFC" font-weight="700" letter-spacing="-0.5">revenuecat</text>
    <text x="72" y="48" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#64748B" font-weight="500" letter-spacing="3">CLI</text>
  </g>

  <text x="80" y="210" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="17" fill="#94A3B8">
    RevenueCat from your terminal.
  </text>
  <text x="80" y="236" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="17" fill="#94A3B8">
    Multi-project. JSON-first. Agent-ready.
  </text>

  <g transform="translate(80, 268)">
    <rect x="0" y="0" width="96" height="28" rx="14" fill="#00C2A8" opacity="0.12" stroke="#00C2A8" stroke-opacity="0.22" stroke-width="1"/>
    <text x="48" y="18" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#2DD4BF" text-anchor="middle" font-weight="500">Go · v2 API</text>
    <rect x="106" y="0" width="118" height="28" rx="14" fill="#3B82F6" opacity="0.12" stroke="#3B82F6" stroke-opacity="0.22" stroke-width="1"/>
    <text x="165" y="18" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#93C5FD" text-anchor="middle" font-weight="500">named contexts</text>
    <rect x="234" y="0" width="104" height="28" rx="14" fill="#10B981" opacity="0.12" stroke="#10B981" stroke-opacity="0.22" stroke-width="1"/>
    <text x="286" y="18" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#6EE7B7" text-anchor="middle" font-weight="500">pull all</text>
  </g>

  <line x1="80" y1="320" x2="440" y2="320" stroke="#1E293B" stroke-width="1"/>
  <text x="80" y="348" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#475569">github.com/FerdiKT/revenuecat-cli</text>

  <g transform="translate(500, 40)">
    <rect x="0" y="0" width="640" height="345" rx="12" fill="url(#termBorder)"/>
    <rect x="1" y="1" width="638" height="343" rx="11" fill="url(#termBg)"/>
    <rect x="1" y="1" width="638" height="36" rx="11" fill="#1B2540"/>
    <rect x="1" y="26" width="638" height="11" fill="#1B2540"/>
    <circle cx="22" cy="19" r="6" fill="#FF5F57"/>
    <circle cx="42" cy="19" r="6" fill="#FEBC2E"/>
    <circle cx="62" cy="19" r="6" fill="#28C840"/>
    <text x="320" y="23" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12" fill="#64748B" text-anchor="middle">revenuecat — zsh</text>
    <line x1="1" y1="37" x2="639" y2="37" stroke="#2B3858" stroke-width="0.5"/>

    <g transform="translate(24, 58)">
      <text y="0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="13">
        <tspan fill="#6B7280">$</tspan>
        <tspan fill="#E2E8F0"> revenuecat contexts list </tspan>
        <tspan fill="#FBBF24">--format table</tspan>
      </text>

      <text y="26" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12.5" fill="#2DD4BF">alias      active  project_id   project_name</text>
      <text y="46" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12.5" fill="#94A3B8">ios-prod   true    proj_123     Main App</text>
      <text y="66" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12.5" fill="#94A3B8">android    false   proj_456     Android App</text>
      <text y="86" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12.5" fill="#94A3B8">web-beta   false   proj_789     Web Billing</text>

      <text y="124" font-family="SF Mono, Menlo, Consolas, monospace" font-size="13">
        <tspan fill="#6B7280">$</tspan>
        <tspan fill="#E2E8F0"> revenuecat pull project </tspan>
        <tspan fill="#FBBF24">--chart trials</tspan>
      </text>

      <text y="148" x="0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12.5" fill="#94A3B8">{</text>
      <text y="166" x="0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12.5" xml:space="preserve"><tspan fill="#94A3B8">  "</tspan><tspan fill="#7DD3FC">schema_version</tspan><tspan fill="#94A3B8">": "</tspan><tspan fill="#A5F3FC">v1alpha1</tspan><tspan fill="#94A3B8">",</tspan></text>
      <text y="184" x="0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12.5" xml:space="preserve"><tspan fill="#94A3B8">  "</tspan><tspan fill="#7DD3FC">context</tspan><tspan fill="#94A3B8">": { "</tspan><tspan fill="#7DD3FC">alias</tspan><tspan fill="#94A3B8">": "</tspan><tspan fill="#A5B4FC">ios-prod</tspan><tspan fill="#94A3B8">" },</tspan></text>
      <text y="202" x="0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12.5" xml:space="preserve"><tspan fill="#94A3B8">  "</tspan><tspan fill="#7DD3FC">project_bundle</tspan><tspan fill="#94A3B8">": {</tspan></text>
      <text y="220" x="0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12.5" xml:space="preserve"><tspan fill="#94A3B8">    "</tspan><tspan fill="#7DD3FC">overview</tspan><tspan fill="#94A3B8">": { "</tspan><tspan fill="#7DD3FC">revenue</tspan><tspan fill="#94A3B8">": </tspan><tspan fill="#6EE7B7">1000</tspan><tspan fill="#94A3B8"> },</tspan></text>
      <text y="238" x="0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12.5" xml:space="preserve"><tspan fill="#94A3B8">    "</tspan><tspan fill="#7DD3FC">charts</tspan><tspan fill="#94A3B8">": { "</tspan><tspan fill="#7DD3FC">trials</tspan><tspan fill="#94A3B8">": { ... } }</tspan></text>
      <text y="256" x="0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12.5" fill="#94A3B8">  }</text>
      <text y="274" x="0" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12.5" fill="#94A3B8">}</text>
    </g>
  </g>
</svg>
